<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" stitchTiles="stitch" result="noise" />
      <feDiffuseLighting in="noise" lighting-color="#ffffff" surfaceScale="2" result="light">
        <feDistantLight azimuth="45" elevation="50" />
      </feDiffuseLighting>
      <feBlend mode="multiply" in="SourceGraphic" in2="light" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" filter="url(#paper)" />
</svg>
